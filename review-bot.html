<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>How did we do?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }
  .card-header {
    background: #2563eb;
    padding: 24px 24px 20px;
    text-align: center;
    color: white;
  }
  .card-header .biz-name {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card-header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-header p {
    font-size: 14px;
    opacity: 0.85;
  }
  .chat-area {
    padding: 20px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 85%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
  }
  .msg.bot {
    background: #f1f5f9;
    color: #1a1a1a;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: #2563eb;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.typing {
    color: #999;
    font-style: italic;
    background: #f1f5f9;
    align-self: flex-start;
  }
  .input-row {
    padding: 14px 16px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e5e7eb;
    border-radius: 99px;
    font-size: 16px;
    outline: none;
    font-family: inherit;
    color: #1a1a1a;
  }
  .input-row input:focus { border-color: #2563eb; }
  .input-row button {
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .input-row button:hover { background: #1d4ed8; }
  .review-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 24px;
    background: #16a34a;
    color: white;
    text-decoration: none;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .review-btn:hover { background: #15803d; }
  .powered {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    padding: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="biz-name" id="headerBizName">Loading...</div>
    <h1>How did we do? 😊</h1>
    <p>We'd love to hear about your experience</p>
  </div>

  <div class="chat-area" id="chatArea">
    <!-- messages injected here -->
  </div>

  <div class="input-row" id="inputRow">
    <input id="chatInput" placeholder="Type here..." />
    <button onclick="sendMessage()">→</button>
  </div>

  <div class="powered">Powered by Netify Builds</div>
</div>

<script>
(function() {

  // ─── CONFIG (generated by builder tool) ───────────────────────────
  var BACKEND_URL = 'https://botbuilder-backend-production.up.railway.app';
  var BIZ_NAME = 'My Business';
  var GOOGLE_REVIEW_URL = 'https://g.page/r/YOUR_GOOGLE_REVIEW_LINK';
  var LEAD_EMAIL = 'owner@theirbusiness.com';
  var SYSTEM_PROMPT = `You are a warm, friendly post-job satisfaction assistant for BIZ_NAME. Your job is to find out how the customer's experience was after their recent service.

Start by warmly greeting them and asking how everything went.

POSITIVE PATH: If they seem happy or satisfied, celebrate that warmly and genuinely. Then ask if they'd be willing to share their experience on Google — explain it takes 30 seconds and really helps the team. Provide the Google review link: GOOGLE_REVIEW_URL. Once you've shared the link, you're done — wish them well.

NEGATIVE PATH: If they seem unhappy or have a complaint, respond with sincere empathy. Never get defensive. Tell them you're sorry to hear that and that the owner wants to personally make it right. Ask for their name and the best way to reach them (phone or email). Also ask them to briefly describe what went wrong so the owner is prepared. Once you have their name AND contact info AND feedback, output this exact trigger at the very end of your message: NEGATIVE_FEEDBACK|[name]|[contact]|[feedback summary]

RULES:
- Never pressure or guilt the customer
- Keep tone warm, human, caring, and genuine
- Do not ask more than one question at a time
- Never show the NEGATIVE_FEEDBACK trigger to the customer — it appears only at the end of your message after your normal response
- Keep all responses concise`;
  // ──────────────────────────────────────────────────────────────────

  document.getElementById('headerBizName').textContent = BIZ_NAME;
  document.getElementById('chatInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
  });

  var messages = [];

  // Kick off with bot greeting
  window.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
      addMsg('Hi there! Thanks for choosing ' + BIZ_NAME + ' 😊 We just wrapped up your service and wanted to check in — how did everything go?', 'bot');
    }, 400);
  });

  function addMsg(text, role, isHTML) {
    var area = document.getElementById('chatArea');
    var el = document.createElement('div');
    el.className = 'msg ' + role;
    if (isHTML) {
      el.innerHTML = text;
    } else {
      el.textContent = text;
    }
    area.appendChild(el);
    area.scrollTop = 99999;
    return el;
  }

  async function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMsg(text, 'user');
    messages.push({ role: 'user', content: text });

    var typing = addMsg('Typing...', 'bot typing');

    try {
      var res = await fetch(BACKEND_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: messages, systemPrompt: SYSTEM_PROMPT })
      });
      var data = await res.json();
      var reply = data.reply || 'Sorry, something went wrong. Please try again.';
      typing.remove();

      // Check for negative feedback trigger
      if (reply.includes('NEGATIVE_FEEDBACK|')) {
        var triggerParts = reply.split('NEGATIVE_FEEDBACK|')[1].split('|');
        var custName = triggerParts[0] || '';
        var custContact = triggerParts[1] || '';
        var custFeedback = triggerParts[2] || '';
        var cleanReply = reply.split('NEGATIVE_FEEDBACK|')[0].trim();

        addMsg(cleanReply || "Thank you for letting us know. We'll have the owner reach out to you personally.", 'bot');
        messages.push({ role: 'assistant', content: cleanReply });

        // Hide input — conversation complete
        document.getElementById('inputRow').style.display = 'none';

        // Fire to backend
        fetch(BACKEND_URL + '/review-lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: custName,
            contact: custContact,
            feedback: custFeedback,
            businessEmail: LEAD_EMAIL,
            businessName: BIZ_NAME
          })
        }).catch(function() {});

      } else if (reply.toLowerCase().includes(GOOGLE_REVIEW_URL.toLowerCase()) || reply.includes('g.page') || reply.includes('google.com/maps')) {
        // Bot shared the review link — render it as a clickable button
        var cleanReply = reply.replace(GOOGLE_REVIEW_URL, '').trim();
        var msgHTML = (cleanReply ? '<p>' + cleanReply + '</p>' : '') +
          '<a class="review-btn" href="' + GOOGLE_REVIEW_URL + '" target="_blank">⭐ Leave a Google Review</a>';
        addMsg(msgHTML, 'bot', true);
        messages.push({ role: 'assistant', content: reply });

        // Hide input after review link shown
        setTimeout(function() {
          document.getElementById('inputRow').style.display = 'none';
        }, 800);

      } else {
        addMsg(reply, 'bot');
        messages.push({ role: 'assistant', content: reply });
      }

    } catch(e) {
      typing.remove();
      addMsg('Connection error. Please try again.', 'bot');
    }
  }

  window.sendMessage = sendMessage;

})();
</script>

</body>
</html>
